'de': {
  s1_label: 'Der Ursprung',
  s1: `<p>Dieses Projekt begann mit einem Buch. Genauer gesagt, mit den Worten von Stephen Hawking.</p>
<p>Er hat mir nie gesagt, was ich denken soll. Er hat mir gezeigt, wie Distanz funktioniert — zwischen Konzepten, zwischen Systemen, zwischen einem Geist und dem, was er zu verstehen versucht. Diese Lücke, und wie man sie überbrückt, war die Idee, die bei mir blieb.</p>
<p>Er war Brite. Englisch, wie er es schrieb, ist die Sprache, mit der diese Plattform beginnt — nicht als Standard, sondern als Zeichen des Respekts.</p>
<div class="pull">Was ich von ihm mitnahm, war nicht Physik. Es war das Verständnis, dass Algorithmen keine Formeln sind. Sie sind Beschreibungen davon, wie Dinge über Distanz zusammenhängen.</div>

<p>Das ist es, was ich sichtbar machen wollte.</p>`,
  s2_label: 'Warum Minderheitensprachen',
  s2: `<p>Ich bin in Japan geboren und aufgewachsen. In der Art, wie die Menschen um mich herum funktionierten, fühlte ich mich oft außerhalb der Muster, die mich umgaben. Das System gab mir eine Behinderungsklassifikation. Die Klassifikation gab mir fast nichts zurück.</p>
<p>Der Wendepunkt war Musik. Die Musik von Céline Dion — und genauer gesagt die Musik aus Québec — gab mir etwas, auf das ich zugehen konnte, als ich sehr wenig anderes hatte. Deshalb ist Québec hier nicht nur eine Sprachoption. Es ist ein Referenzpunkt. Ein Ort, der für etwas stand, als ich Orientierung brauchte.</p>
<p>Von dort aus begann ich, den Ursprüngen des Französischen zu folgen. Dann anderen Sprachen. Die Etymologie führte mich zu Minderheitensprachen — Bretonisch, Okzitanisch, Baskisch, Rätoromanisch — und ich begann zu verstehen, dass eine Sprache nicht nur ein Kommunikationswerkzeug ist. Sie ist eine Umgebung. Sie trägt die Form, wie eine Gemeinschaft die Welt gesehen hat.</p>
<div class="pull">Der Grund, warum so viele Plattformen nicht in Minderheitensprachen übersetzen, ist einfach: Es gibt weniger Sprecher. Aber diese Logik kehrt den Punkt um.</div>
<p>Je weniger Menschen eine Sprache sprechen, desto wichtiger wird es, Informationen in ihr anzubieten. Verstehen ist immer am klarsten in der Sprache, die einem am nächsten ist.</p>
<p>Das ist das einzige Prinzip hinter den Sprachwahlen hier. Nicht Abdeckung. <span class="strong">Nähe.</span></p>`
},

  s2: `<p>Ich bin in Japan auf die Welt gekommen und aufgewachsen. In der Art, wie die Leute um mich herum funktioniert haben, hab ich mich oft außerhalb der Muster gefühlt, die mich umgeben haben. Das System hat mir eine Behinderungsklassifikation gegeben. Die Klassifikation hat mir fast nichts zurückgegeben.</p>
<p>Der Wendepunkt war die Musik. Die Musik von Céline Dion — und genauer gesagt die Musik aus Québec — hat mir etwas gegeben, auf das ich zugehen konnte, als ich sehr wenig anderes gehabt hab. Deshalb ist Québec hier nicht bloß eine Sprachoption. Es ist ein Referenzpunkt. Ein Ort, der für etwas gestanden ist, als ich Orientierung gebraucht hab.</p>
<p>Von dort hab ich angefangen, den Ursprüngen des Französischen nachzugehen. Dann anderen Sprachen. Die Etymologie hat mich zu Minderheitensprachen geführt — Bretonisch, Okzitanisch, Baskisch, Rätoromanisch — und ich hab angefangen zu verstehen, dass eine Sprache nicht nur ein Kommunikationswerkzeug ist. Sie ist eine Umgebung. Sie trägt die Form, wie eine Gemeinschaft die Welt gesehen hat.</p>
<div class="pull">Der Grund, warum so viele Plattformen nicht in Minderheitensprachen übersetzen, ist einfach: Es gibt weniger Sprecher. Aber diese Logik dreht den Punkt um.</div>
<p>Je weniger Leute eine Sprache sprechen, desto wichtiger wird es, Informationen in ihr anzubieten. Verstehen ist immer am klarsten in der Sprache, die einem am nächsten ist.</p>
<p>Das ist das einzige Prinzip hinter den Sprachwahlen hier. Nicht Abdeckung. <span class="strong">Nähe.</span></p>`
},

'de-CH': {

  s1: `<p>Dieses Projekt hat mit einem Buch begonnen. Genauer gesagt mit den Worten von Stephen Hawking.</p>
<p>Er hat mir nie gesagt, was ich denken soll. Er hat mir gezeigt, wie Distanz funktioniert — zwischen Konzepten, zwischen Systemen, zwischen einem Verstand und dem, was er zu verstehen versucht. Diese Lücke, und wie man sie überbrückt, das ist die Idee, die bei mir geblieben ist.</p>
<p>Er war Brite. Englisch, wie er es geschrieben hat, ist die Sprache, mit der diese Plattform beginnt — nicht als Standard, sondern als Zeichen des Respekts.</p>

'nl': {
  s1_label: 'De Oorsprong',
  s1: `<p>Dit project begon met een boek. Meer precies, met de woorden van Stephen Hawking.</p>
<p>Hij vertelde me nooit wat ik moest denken. Hij liet me zien hoe afstand werkt — tussen concepten, tussen systemen, tussen een geest en datgene wat hij probeert te begrijpen. Die kloof, en hoe je die overbrugt, was het idee dat bij me bleef.</p>
<p>Hij was Brits. Engels zoals hij het schreef is de taal waarmee dit platform opent — niet als standaard, maar als blijk van respect.</p>
<div class="pull">Wat ik van hem meenam was geen natuurkunde. Het was het begrip dat algoritmen geen formules zijn. Het zijn beschrijvingen van hoe dingen zich over afstand tot elkaar verhouden.</div>
<p>De berekening komt daarna. Het concept komt eerst. En als je ontwerpt vanuit concept in plaats van formule, heeft het resultaat een andere kwaliteit — het aarzelt, het zoekt, het vindt. Die aarzeling is geen fout. Het is wat een algoritme werkelijk is.</p>
<p>Dat is wat ik zichtbaar wilde maken.</p>`,
  s2_label: 'Waarom Minderheidstalen',
  s2: `<p>Ik ben geboren en opgegroeid in Japan. In de manier waarop de mensen om me heen functioneerden, voelde ik me vaak buiten de patronen die me omringden. Het systeem gaf me een handicapclassificatie. De classificatie gaf me bijna niets terug.</p>
<p>Het keerpunt was muziek. De muziek van Céline Dion — en meer specifiek de muziek die uit Québec kwam — gaf me iets om naartoe te bewegen toen ik heel weinig anders had. Daarom is Québec hier niet zomaar een taaloptie. Het is een referentiepunt. Een plek die voor iets stond toen ik richting nodig had.</p>
<p>Van daaruit begon ik de oorsprong van het Frans te volgen. Dan andere talen. Etymologie leidde me naar minderheidstalen — Bretons, Occitaans, Baskisch, Reto-Romaans — en ik begon te begrijpen dat een taal niet alleen een communicatiemiddel is. Het is een omgeving. Het draagt de vorm van hoe een gemeenschap de wereld heeft gezien.</p>
<div class="pull">De reden waarom zoveel platforms niet vertalen in minderheidstalen is simpel: er zijn minder sprekers. Maar die logica keert het punt om.</div>
<p>Hoe minder mensen een taal spreken, hoe belangrijker het wordt om informatie erin aan te bieden. Begrip is altijd het helderst in de taal die het dichtst bij je staat.</p>
<p>Dat is het enige principe achter de taalkeuzes hier. Niet dekking. <span class="strong">Nabijheid.</span></p>`
},

'lb': {
  s1_label: 'Den Ursprong',
  s1: `<p>Dëse Projet huet mat engem Buch ugefaangen. Méi präzis, mat de Wierder vum Stephen Hawking.</p>
<p>Hie huet mir ni gesot, wat ech sollt denken. Hie huet mir gewisen, wéi Distanz funktionéiert — tëscht Konzepter, tëscht Systemer, tëscht engem Geescht an deem, wat hien ze verstoen versicht. Dës Lück, a wéi een se iwwerbréckst, war d'Iddi, déi bei mir bliwwen ass.</p>
<p>Hie war Britesch. Englesch, wéi hien et geschriwwen huet, ass d'Sprooch, mat där dës Plattform opmaacht — net als Standard, mee als Zeeche vum Respekt.</p>
<div class="pull">Wat ech vun him matgeholl hunn, war net Physik. Et war d'Verständnis, datt Algorithmen keng Formelen sinn. Si sinn Beschreiwunge vun der Manéier, wéi Saachen iwwer Distanz zesummenhänken.</div>
<p>D'Berechnung kënnt duerno. D'Konzept kënnt als éischt. A wann een vum Konzept aus entworf statt vun der Formel, huet d'Resultat eng aner Qualitéit — et zéckt, et sicht, et fënnt. Dëst Zécken ass kee Feeler. Et ass dat, wat en Algorithmus wierklech ass.</p>
<p>Dat ass et, wat ech sichtbar maache wollt.</p>`,
  s2_label: 'Firwat Minderheetsprooche',
  s2: `<p>Ech sinn a Japan gebuer a grouss ginn. An der Aart a Weis, wéi d'Leit ëm mech erëm funktionéiert hunn, hunn ech mech dacks ausserhalb vun de Musteren gefillt, déi mech ëmginn hunn. D'System huet mir eng Behënnerungsklassifikatioun ginn. D'Klassifikatioun huet mir bal näischt zréckginn.</p>
<p>Den Tournant war Musek. D'Musek vun der Céline Dion — a méi präzis, d'Musek, déi aus dem Québec koum — huet mir eppes ginn, op dat ech kéinte zugoen, wann ech ganz wéineg aneres hat. Dofir ass Québec hei net just eng Sproochoption. Et ass e Referenzpunkt. E Plaz, deen fir eppes gestanen ass, wann ech Orientéierung gebraucht hunn.</p>
<p>Vun do aus hunn ech ugefaangen, den Urspréng vum Franséischen ze verfollegen. Dann aner Sprooche. D'Etymologie huet mech zu Minderheetsprooche gefouert — Bretonnesch, Okzitanesch, Baskisch, Rätoromanisch — a ech hunn ugefaangen ze verstoen, datt eng Sprooch net just e Kommunikatiounsmëttel ass. Si ass eng Ëmwelt. Si dréit d'Form, wéi eng Gemeinschaft d'Welt gesinn huet.</p>
<div class="pull">De Grond, firwat sou vill Plattforme net a Minderheetsprooche iwwersetzen, ass einfach: et gëtt manner Spriecher. Mee dës Logik dreent de Punkt ëm.</div>
<p>Jo manner Leit eng Sprooch schwätzen, dest wichteger gëtt et, Informatiounen dorin unzebidden. Verstäendnis ass ëmmer am kloersten an der Sprooch, déi engem am noosten ass.</p>
<p>Dat ass de eenzege Prinzip hannert de Sproochwielen hei. Net Ofdeckung. <span class="strong">Noperschaft.</span></p>`
},

'it': {
  s1_label: 'L\'Origine',
  s1: `<p>Questo progetto è iniziato con un libro. Più precisamente, con le parole di Stephen Hawking.</p>
<p>Non mi ha mai detto cosa pensare. Mi ha mostrato come funziona la distanza — tra i concetti, tra i sistemi, tra una mente e ciò che sta cercando di capire. Quel divario, e come lo si attraversa, era l'idea che mi è rimasta.</p>
<p>Era britannico. L'inglese come lui lo scriveva è la lingua con cui questa piattaforma si apre — non come impostazione predefinita, ma come atto di rispetto.</p>
<div class="pull">Quello che ho preso da lui non era la fisica. Era la comprensione che gli algoritmi non sono formule. Sono descrizioni di come le cose si relazionano attraverso la distanza.</div>
<p>Il calcolo viene dopo. Il concetto viene prima. E quando si progetta dal concetto piuttosto che dalla formula, il risultato ha una qualità diversa — esita, cerca, trova. Quell'esitazione non è un difetto. È quello che è realmente un algoritmo.</p>
<p>Questo è ciò che volevo rendere visibile.</p>`,
  s2_label: 'Perché le Lingue Minoritarie',
  s2: `<p>Sono nato e cresciuto in Giappone. Nel modo in cui le persone intorno a me funzionavano, mi sentivo spesso al di fuori dei modelli che mi circondavano. Il sistema mi ha dato una classificazione di disabilità. La classificazione mi ha restituito quasi nulla.</p>
<p>Il punto di svolta è stata la musica. La musica di Céline Dion — e più specificamente la musica proveniente dal Québec — mi ha dato qualcosa verso cui muovermi quando avevo molto poco altro. Ecco perché il Québec qui non è solo un'opzione linguistica. È un punto di riferimento. Un luogo che rappresentava qualcosa quando avevo bisogno di direzione.</p>
<p>Da lì ho iniziato a seguire le origini del francese. Poi altre lingue. L'etimologia mi ha portato alle lingue minoritarie — bretone, occitano, basco, romancio — e ho cominciato a capire che una lingua non è solo uno strumento di comunicazione. È un ambiente. Porta la forma di come una comunità ha visto il mondo.</p>
<div class="pull">Il motivo per cui molte piattaforme non traducono nelle lingue minoritarie è semplice: ci sono meno parlanti. Ma questa logica inverte il punto.</div>
<p>Meno persone parlano una lingua, più diventa importante offrire informazioni in essa. La comprensione è sempre più chiara nella lingua più vicina a te.</p>
<p>Questo è l'unico principio dietro le scelte linguistiche qui. Non la copertura. <span class="strong">La prossimità.</span></p>`
},

'pt': {
  s1_label: 'A Origem',
  s1: `<p>Este projeto começou com um livro. Mais precisamente, com as palavras de Stephen Hawking.</p>
<p>Ele nunca me disse o que pensar. Mostrou-me como a distância funciona — entre conceitos, entre sistemas, entre uma mente e aquilo que ela tenta compreender. Esse intervalo, e como se atravessa, foi a ideia que ficou comigo.</p>
<p>Era britânico. O inglês como ele o escrevia é a língua com que esta plataforma abre — não como predefinição, mas como um acto de respeito.</p>
<div class="pull">O que retirei dele não foi física. Foi a compreensão de que os algoritmos não são fórmulas. São descrições de como as coisas se relacionam através da distância.</div>
<p>O cálculo vem depois. O conceito vem primeiro. E quando se projecta a partir do conceito em vez da fórmula, o resultado tem uma qualidade diferente — hesita, procura, encontra. Essa hesitação não é um defeito. É o que um algoritmo realmente é.</p>
<p>Foi isso que quis tornar visível.</p>`,
  s2_label: 'Porquê as Línguas Minoritárias',
  s2: `<p>Nasci e cresci no Japão. Na forma como as pessoas à minha volta funcionavam, sentia-me frequentemente fora dos padrões que me rodeavam. O sistema deu-me uma classificação de deficiência. A classificação quase nada me devolveu.</p>
<p>O ponto de viragem foi a música. A música de Céline Dion — e mais especificamente a música que vinha do Québec — deu-me algo em direcção ao qual avançar quando tinha muito pouco mais. É por isso que o Québec não é aqui apenas uma opção linguística. É um ponto de referência. Um lugar que representava algo quando precisava de direcção.</p>
<p>A partir daí comecei a seguir as origens do francês. Depois outras línguas. A etimologia conduziu-me às línguas minoritárias — bretão, occitano, basco, romanche — e comecei a compreender que uma língua não é apenas uma ferramenta de comunicação. É um ambiente. Carrega a forma como uma comunidade viu o mundo.</p>
<div class="pull">A razão pela qual tantas plataformas não traduzem para línguas minoritárias é simples: há menos falantes. Mas essa lógica inverte o ponto.</div>
<p>Quanto menos pessoas falam uma língua, mais importante se torna oferecer informação nela. A compreensão é sempre mais clara na língua mais próxima de si.</p>
<p>Esse é o único princípio por trás das escolhas linguísticas aqui. Não a cobertura. <span class="strong">A proximidade.</span></p>`
},

'es': {
  s1_label: 'El Origen',
  s1: `<p>Este proyecto comenzó con un libro. Más precisamente, con las palabras de Stephen Hawking.</p>
<p>Nunca me dijo qué pensar. Me mostró cómo funciona la distancia — entre conceptos, entre sistemas, entre una mente y aquello que intenta comprender. Esa brecha, y cómo se atraviesa, fue la idea que se quedó conmigo.</p>
<p>Era británico. El inglés tal como él lo escribía es el idioma con el que esta plataforma abre — no como predeterminado, sino como un acto de respeto.</p>
<div class="pull">Lo que tomé de él no fue física. Fue la comprensión de que los algoritmos no son fórmulas. Son descripciones de cómo las cosas se relacionan a través de la distancia.</div>
<p>El cálculo viene después. El concepto viene primero. Y cuando se diseña desde el concepto en lugar de la fórmula, el resultado tiene una calidad diferente — duda, busca, encuentra. Esa duda no es un defecto. Es lo que un algoritmo realmente es.</p>
<p>Eso es lo que quería hacer visible.</p>`,
  s2_label: 'Por Qué las Lenguas Minoritarias',
  s2: `<p>Nací y crecí en Japón. En la forma en que las personas a mi alrededor funcionaban, a menudo me sentía fuera de los patrones que me rodeaban. El sistema me dio una clasificación de discapacidad. La clasificación me devolvió casi nada.</p>
<p>El punto de inflexión fue la música. La música de Céline Dion — y más específicamente la música que venía de Québec — me dio algo hacia lo cual avanzar cuando tenía muy poco más. Por eso Québec no es solo una opción de idioma aquí. Es un punto de referencia. Un lugar que representaba algo cuando necesitaba dirección.</p>
<p>Desde allí empecé a seguir los orígenes del francés. Luego otros idiomas. La etimología me llevó a las lenguas minoritarias — bretón, occitano, vasco, romanche — y empecé a entender que un idioma no es solo una herramienta de comunicación. Es un entorno. Lleva la forma en que una comunidad ha visto el mundo.</p>
<div class="pull">La razón por la que tantas plataformas no traducen a lenguas minoritarias es simple: hay menos hablantes. Pero esa lógica invierte el punto.</div>
<p>Cuantas menos personas hablan un idioma, más importante se vuelve ofrecer información en él. La comprensión siempre es más clara en el idioma más cercano a ti.</p>
<p>Ese es el único principio detrás de las elecciones de idioma aquí. No la cobertura. <span class="strong">La proximidad.</span></p>`
},

'is': {
  s1_label: 'Uppruni',
  s1: `<p>Þetta verkefni hófst með bók. Nánar tiltekið, með orðum Stephens Hawking.</p>
<p>Hann sagði mér aldrei hvað ég ætti að hugsa. Hann sýndi mér hvernig fjarlægð virkar — milli hugmynda, milli kerfa, milli huga og þess sem hann reynir að skilja. Þetta bil, og hvernig maður fer yfir það, var hugmyndin sem dvaldi hjá mér.</p>
<p>Hann var Breti. Enska eins og hann skrifaði hana er tungumálið sem þessi vettvangur opnast á — ekki sem sjálfgefið, heldur sem virðingargjörð.</p>
<div class="pull">Það sem ég tók frá honum var ekki eðlisfræði. Það var skilningurinn á því að reiknirit eru ekki formúlur. Þær eru lýsingar á því hvernig hlutir tengjast yfir fjarlægð.</div>
<p>Útreikningurinn kemur á eftir. Hugmyndin kemur fyrst. Og þegar maður hannar frá hugmynd frekar en formúlu, hefur niðurstaðan aðra gæði — hún dregur sig, leitar, finnur. Þessi dráttur er ekki galli. Það er það sem reiknirit er í raun.</p>
<p>Það er það sem ég vildi gera sýnilegt.</p>`,
  s2_label: 'Af hverju minnihlutamál',
  s2: `<p>Ég fæddist og ólst upp í Japan. Í þeim hætti sem fólkið í kringum mig starfaði, fann ég oft til þess að vera utan við mynstur sem umkringdi mig. Kerfið gaf mér fötlunarflokkunar. Flokkun skilaði mér nánast engu.</p>
<p>Vendipunkturinn var tónlist. Tónlist Céline Dion — og nánar tiltekið tónlist sem kom frá Québec — gaf mér eitthvað að stefna að þegar ég átti mjög lítið annað. Þess vegna er Québec hér ekki bara tungumálsval. Það er viðmiðunarpunktur. Staður sem stóð fyrir eitthvað þegar ég þarfnaðist stefnu.</p>
<p>Þaðan byrjaði ég að fylgja uppruna frönsku. Síðan öðrum tungumálum. Orðsifjafræðin leiddi mig að minnihlutamálum — bretónsku, okkítönsku, baski, rómönsku — og ég fór að skilja að tungumál er ekki bara samskiptatæki. Það er umhverfi. Það ber lögun þess hvernig þjóðfélag hefur séð heiminn.</p>
<div class="pull">Ástæðan fyrir því að svo margar vettvangar þýða ekki yfir á minnihlutamál er einföld: það eru færri talendur. En sú rök snýr punktinum við.</div>
<p>Því færri sem tala tungumál, þeim mun mikilvægara verður að bjóða upp á upplýsingar á því. Skilningur er alltaf skýrastur á tungumálinu sem er þér næst.</p>
<p>Það er eina meginreglan á bak við tungumálsvalið hér. Ekki umfang. <span class="strong">Nálægð.</span></p>`
},

'ca': {
  s1_label: 'L\'Origen',
  s1: `<p>Aquest projecte va començar amb un llibre. Més concretament, amb les paraules de Stephen Hawking.</p>
<p>Mai no em va dir què havia de pensar. Em va mostrar com funciona la distància — entre conceptes, entre sistemes, entre una ment i allò que intenta comprendre. Aquesta bretxa, i com se supera, va ser la idea que em va quedar.</p>
<p>Era britànic. L'anglès tal com ell l'escrivia és la llengua amb què aquesta plataforma s'obre — no com a opció per defecte, sinó com un acte de respecte.</p>
<div class="pull">El que vaig treure d'ell no va ser física. Va ser la comprensió que els algoritmes no són fórmules. Són descripcions de com les coses es relacionen a través de la distància.</div>
<p>El càlcul ve després. El concepte ve primer. I quan es dissenya des del concepte en lloc de la fórmula, el resultat té una qualitat diferent — dubta, cerca, troba. Aquest dubte no és un defecte. És el que un algoritme realment és.</p>
<p>Això és el que volia fer visible.</p>`,
  s2_label: 'Per Què les Llengües Minoritàries',
  s2: `<p>Vaig néixer i créixer al Japó. En la manera com la gent al meu voltant funcionava, sovint em sentia fora dels patrons que m'envoltaven. El sistema em va donar una classificació de discapacitat. La classificació gairebé no em va retornar res.</p>
<p>El punt d'inflexió va ser la música. La música de Céline Dion — i més concretament la música que venia del Québec — em va donar alguna cosa cap a la qual avançar quan tenia molt poc més. Per això el Québec no és aquí només una opció lingüística. És un punt de referència. Un lloc que representava alguna cosa quan necessitava direcció.</p>
<p>A partir d'allà vaig començar a seguir els orígens del francès. Després altres llengües. L'etimologia em va portar a les llengües minoritàries — bretó, occità, basc, romanx — i vaig començar a entendre que una llengua no és només una eina de comunicació. És un entorn. Porta la forma en què una comunitat ha vist el món.</p>
<div class="pull">La raó per la qual tantes plataformes no tradueixen a llengües minoritàries és senzilla: hi ha menys parlants. Però aquesta lògica inverteix el punt.</div>
<p>Com menys gent parla una llengua, més important és oferir-hi informació. La comprensió sempre és més clara en la llengua més propera a tu.</p>
<p>Aquest és l'únic principi darrere de les eleccions lingüístiques aquí. No la cobertura. <span class="strong">La proximitat.</span></p>`
},

'eu': {

  s1: `<p>Proiektu hau liburu batekin hasi zen. Zehazkiago, Stephen Hawkingen hitzen bidez.</p>

  s2_label: 'Zergatik Gutxiengoaren Hizkuntzak',
  s2: `<p>Japonian jaio eta hazi nintzen. Inguruko jendeak nola funtzionatzen zuen ikusirik, maiz sentitzen nintzen nire inguruan zeuden ereduetatik kanpo. Sistemak ezgaitasun sailkapen bat eman zidan. Sailkapenak ia ezer ez zidan itzuli.</p>

// ── State & render ─────────────────────────────────────────────────────
let curLang = cifraGetLang();

function buildLangBar() {
  const bar = document.getElementById('langbar');
  bar.innerHTML = '';
  CIFRA_LANGS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (l.id === curLang ? ' active' : '');
    btn.textContent = l.label + ' ' + l.id.toUpperCase();
    btn.title = l.name;
    btn.addEventListener('click', () => { curLang = l.id; cifraSetLang(l.id); render(); });
    bar.appendChild(btn);
  });
}

function render() {
  const t = ABOUT[curLang] || ABOUT['en-GB'];
  document.getElementById('content').innerHTML = `
    <div class="section">
