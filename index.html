<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cifra/dispersio — free</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080a14;--surface:#0b0d1a;--panel:#0e1020;--border:#1a2248;
  --accent:#4169e1;--accent2:#6a8fff;--text:#c8d0f0;--dim:#7080b0;--muted:#2a3460;
  --hawking:#e16941;--crypto:#41e1a8;--paper:#a841e1;--bridge:#4169e1;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--mono);font-size:12px;color:var(--text);display:flex;flex-direction:column;}

/* ── topbar ── */
.topbar{
  height:42px;display:flex;align-items:center;gap:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:200;padding:0 16px;
}
.logo{color:var(--accent);font-weight:700;font-size:14px;letter-spacing:1.5px;margin-right:20px;}
.tab{
  height:42px;display:flex;align-items:center;padding:0 14px;
  font-size:10px;color:var(--dim);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.08em;user-select:none;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent2);}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.top-btn{
  font-family:var(--mono);font-size:9px;padding:3px 10px;
  border:1px solid var(--border);background:transparent;color:var(--dim);
  border-radius:3px;cursor:pointer;transition:all .15s;letter-spacing:.05em;
}
.top-btn:hover{color:var(--text);border-color:var(--muted);}
.top-btn.on{color:var(--accent);border-color:var(--accent);}
.top-btn.on-crypto{color:var(--crypto);border-color:var(--crypto);}
.top-btn.editor-btn{color:var(--hawking);border-color:var(--hawking);background:rgba(225,105,65,.08);}

/* ── workspace ── */
.workspace{
  flex:1;display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr;
  gap:1px;background:var(--border);overflow:hidden;
  position:relative;
}

/* ── panes ── */
.pane{background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column;}
.pane-header{
  height:30px;display:flex;align-items:center;gap:10px;padding:0 14px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.pane-title{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;}
.pane-title.hawking{color:var(--hawking);}
.pane-title.graph{color:var(--crypto);}
.pane-title.metrics{color:var(--accent2);}
.pane-body{flex:1;overflow:hidden;position:relative;}

/* ── THREE canvas ── */
#bhCanvas{width:100%;height:100%;display:block;}

/* ── D3 ── */
#graphSvg{width:100%;height:100%;}
.node circle{stroke-width:1.5;cursor:pointer;transition:filter .15s;}
.node text{font-family:var(--mono);font-size:8px;fill:var(--dim);pointer-events:none;}
.node.selected circle{stroke-width:2.5;}
.glink{fill:none;stroke-opacity:.28;}

/* ── metrics ── */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);height:100%;}
.metric-cell{background:var(--bg);padding:10px 14px;display:flex;flex-direction:column;justify-content:center;}
.mc-label{font-size:8px;letter-spacing:.15em;color:var(--dim);text-transform:uppercase;margin-bottom:5px;}
.mc-value{font-size:19px;font-weight:700;letter-spacing:-.02em;line-height:1;}
.mc-unit{font-size:9px;color:var(--dim);margin-left:3px;font-weight:300;}
.mc-bar{margin-top:7px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.mc-fill{height:100%;border-radius:1px;transition:width .4s;}

/* ── bottom right ── */
.bottom-right{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}
.br-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.br-tab{
  font-size:9px;padding:0 14px;height:30px;display:flex;align-items:center;
  color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;
  letter-spacing:.1em;text-transform:uppercase;transition:all .15s;
}
.br-tab.active{color:var(--paper);border-bottom-color:var(--paper);}
.br-body{flex:1;overflow-y:auto;padding:12px 16px;}
.br-body::-webkit-scrollbar{width:3px;}
.br-body::-webkit-scrollbar-thumb{background:var(--muted);}
.nd-type{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:5px;}
.nd-title{font-size:13px;font-weight:700;color:#e0e8ff;margin-bottom:7px;line-height:1.4;}
.nd-src{font-size:9px;color:var(--dim);padding:4px 8px;border:1px solid var(--border);border-radius:2px;margin-bottom:9px;background:var(--panel);}
.nd-desc{font-size:10px;color:var(--text);line-height:1.9;font-weight:300;margin-bottom:9px;}
.nd-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tag{font-size:8px;padding:2px 7px;border-radius:2px;border:1px solid;}
.tag-h{color:var(--hawking);border-color:rgba(225,105,65,.3);background:rgba(225,105,65,.05);}
.tag-c{color:var(--crypto);border-color:rgba(65,225,168,.3);background:rgba(65,225,168,.05);}
.tag-p{color:var(--paper);border-color:rgba(168,65,225,.3);background:rgba(168,65,225,.05);}
.tag-n{color:var(--dim);border-color:var(--border);}
.nd-empty{font-size:10px;color:var(--dim);font-style:italic;line-height:1.9;}
.log-entry{display:flex;gap:8px;font-size:9px;padding:3px 0;border-bottom:1px solid var(--border);}
.log-t{color:var(--muted);flex-shrink:0;}
.log-emit{color:var(--hawking);}
.log-disp{color:var(--crypto);}
.log-evap{color:#e1c041;}
.log-info{color:var(--dim);}
.log-node{color:var(--paper);}
.log-code{color:var(--accent2);}

/* ── BH controls ── */
.bh-controls{position:absolute;bottom:10px;left:10px;display:flex;gap:6px;flex-wrap:wrap;z-index:10;}
.bh-btn{
  font-family:var(--mono);font-size:9px;padding:3px 9px;
  border:1px solid var(--border);background:rgba(8,10,20,.85);color:var(--dim);
  border-radius:2px;cursor:pointer;transition:all .15s;backdrop-filter:blur(4px);
}
.bh-btn:hover{color:var(--text);border-color:var(--muted);}
.bh-btn.on{color:var(--hawking);border-color:var(--hawking);}
.bh-btn.on-c{color:var(--crypto);border-color:var(--crypto);}
.graph-controls{position:absolute;bottom:10px;left:10px;display:flex;gap:6px;z-index:10;}

/* ════════════════════════════════════════════════
   EDITOR SLIDE-IN PANEL
════════════════════════════════════════════════ */
.editor-overlay{
  position:fixed;top:0;right:0;bottom:0;
  width:520px;
  background:rgba(8,10,20,.97);
  border-left:1px solid var(--border);
  backdrop-filter:blur(12px);
  z-index:500;
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 40px rgba(0,0,0,.6);
}
.editor-overlay.open{transform:translateX(0);}

.editor-topbar{
  height:42px;display:flex;align-items:center;padding:0 16px;gap:12px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.editor-title{font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--hawking);text-transform:uppercase;}
.editor-close{
  margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--dim);
  cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:3px;
  background:transparent;transition:all .15s;
}
.editor-close:hover{color:var(--text);border-color:var(--muted);}

.editor-lang-bar{
  display:flex;gap:4px;padding:6px 14px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;
}
.lang-btn{
  font-family:var(--mono);font-size:9px;padding:2px 8px;
  border:1px solid var(--border);background:transparent;color:var(--dim);
  border-radius:2px;cursor:pointer;transition:all .15s;
}
.lang-btn:hover{color:var(--text);}
.lang-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(65,105,225,.08);}

.editor-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.editor-area{
  flex:1;position:relative;overflow:hidden;
}
.editor-textarea{
  width:100%;height:100%;
  background:transparent;
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
  line-height:1.7;
  padding:16px 16px 16px 52px;
  border:none;outline:none;
  resize:none;
  caret-color:var(--hawking);
  position:relative;z-index:2;
  tab-size:2;
}
.editor-textarea::selection{background:rgba(65,105,225,.25);}
.line-numbers{
  position:absolute;left:0;top:0;bottom:0;width:44px;
  padding:16px 8px 16px 0;
  font-family:var(--mono);font-size:12px;line-height:1.7;
  color:var(--muted);text-align:right;
  pointer-events:none;z-index:1;
  border-right:1px solid var(--border);
  overflow:hidden;
}

.editor-output{
  height:110px;border-top:1px solid var(--border);
  background:var(--panel);flex-shrink:0;
  display:flex;flex-direction:column;overflow:hidden;
}
.output-header{
  height:26px;display:flex;align-items:center;padding:0 14px;gap:10px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.output-label{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}
.run-btn{
  margin-left:auto;font-family:var(--mono);font-size:9px;padding:2px 10px;
  border:1px solid var(--crypto);background:rgba(65,225,168,.08);color:var(--crypto);
  border-radius:2px;cursor:pointer;transition:all .15s;
}
.run-btn:hover{background:rgba(65,225,168,.15);}
.output-body{flex:1;overflow-y:auto;padding:8px 14px;font-size:10px;line-height:1.8;color:var(--dim);}
.output-body::-webkit-scrollbar{width:3px;}
.output-body::-webkit-scrollbar-thumb{background:var(--muted);}
.out-ok{color:var(--crypto);}
.out-err{color:var(--hawking);}
.out-info{color:var(--accent2);}

/* match indicator strip */
.match-strip{
  padding:6px 14px;border-top:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  min-height:32px;
}
.match-label{font-size:8px;letter-spacing:.15em;color:var(--dim);text-transform:uppercase;}
.match-node{
  font-size:9px;padding:2px 8px;border-radius:2px;border:1px solid;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.match-node.hawking{color:var(--hawking);border-color:rgba(225,105,65,.4);background:rgba(225,105,65,.08);}
.match-node.crypto{color:var(--crypto);border-color:rgba(65,225,168,.4);background:rgba(65,225,168,.08);}
.match-node.paper{color:var(--paper);border-color:rgba(168,65,225,.4);background:rgba(168,65,225,.08);}
.match-node.bridge{color:var(--accent2);border-color:rgba(106,143,255,.4);background:rgba(106,143,255,.08);}

/* node glow pulse */
@keyframes nodePulse{
  0%{filter:brightness(1);}
  50%{filter:brightness(2.2) drop-shadow(0 0 6px currentColor);}
  100%{filter:brightness(1.4);}
}
.node.lit circle{animation:nodePulse .6s ease forwards;}

/* ── guide pane ── */
.guide-pane{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.guide-pane .pane-header{padding:0 14px;height:36px;display:flex;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;}
.guide-body{flex:1;overflow-y:auto;padding:24px 20px 32px;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}
.guide-body::-webkit-scrollbar{width:3px;}
.guide-body::-webkit-scrollbar-thumb{background:var(--dim);}

.g-section{margin-bottom:28px;}
.g-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.g-label::after{content:'';flex:1;height:1px;background:var(--border);}
.g-text{font-size:11px;line-height:1.9;color:var(--text);font-weight:300;}
.g-text p{margin-bottom:10px;}
.g-text p:last-child{margin-bottom:0;}

.read-order{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.ro-item{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:3px;background:var(--bg);text-decoration:none;transition:border-color .15s,background .15s;}
.ro-item:hover{border-color:var(--accent);background:rgba(65,105,225,.06);}
.ro-num{font-size:16px;font-weight:700;color:var(--accent);line-height:1;flex-shrink:0;width:20px;text-align:center;}
.ro-content{flex:1;}
.ro-title{font-size:11px;font-weight:700;color:var(--text);letter-spacing:.05em;margin-bottom:3px;}
.ro-desc{font-size:9px;color:var(--dim);line-height:1.6;}

/* ── langbar ── */
.langbar{display:flex;align-items:center;gap:4px;padding:6px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.lang-btn{padding:2px 7px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:var(--mono),monospace;font-size:9px;cursor:pointer;transition:all .15s;user-select:none;}
.lang-btn:hover{color:var(--text);border-color:var(--muted);}
.lang-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(65,105,225,.08);}
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="logo">cifra/dispersio</div>
  <span style="font-size:9px;padding:2px 8px;border:1px solid #e14169;color:#e14169;border-radius:2px;letter-spacing:.15em;text-transform:uppercase;">free</span>
  <div class="tab active">unified</div>
  <div class="tab">hawking</div>
  <div class="tab">graph</div>
  <div class="tab">about</div>
  <div class="topbar-right">
    <button class="top-btn editor-btn" id="btnOpenEditor">{ } editor</button>
  </div>
</div>

<div class="langbar" id="fLangbar"></div>

<!-- ── WORKSPACE ── -->
<div class="workspace">

  <!-- LEFT: dispersal graph -->
  <div class="pane">
    <div class="pane-header">
      <span class="pane-title hawking">hawking radiation</span>
      <span style="margin-left:auto;font-size:9px;color:var(--muted)">T ∝ 1/M</span>
    </div>
    <div class="pane-body">
      <canvas id="bhCanvas" style="width:100%;height:100%;display:block;"></canvas>
    </div>
  </div>

  <!-- RIGHT: guide -->
  <div class="guide-pane">
    <div class="pane-header">
      <span class="pane-title" style="color:var(--accent)" id="guideTitle">dispersio · reading guide</span>
    </div>
    <div class="guide-body" id="guideBody"></div>
  </div>

</div>
  </div>

</div>

<!-- ════════════════════════════════════════════════
     EDITOR SLIDE-IN PANEL
════════════════════════════════════════════════ -->
<div class="editor-overlay" id="editorPanel">

  <div class="editor-topbar">
    <span class="editor-title">{ } code editor</span>
    <span style="font-size:9px;color:var(--dim);font-style:italic">type to illuminate the graph</span>
    <button class="editor-close" id="btnCloseEditor">✕ close</button>
  </div>

  <div class="editor-lang-bar">
    <span style="font-size:9px;color:var(--dim);margin-right:4px;letter-spacing:.1em">LANG</span>
    <button class="lang-btn active" data-lang="js">JS</button>
    <button class="lang-btn" data-lang="py">PY</button>
    <button class="lang-btn" data-lang="rs">RS</button>
  </div>

  <div class="editor-body">
    <div class="editor-area">
      <div class="line-numbers" id="lineNumbers">1</div>
      <textarea class="editor-textarea" id="codeEditor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">// cifra/dispersio — code editor
// Type keywords to illuminate connected graph nodes
// e.g. hawking, entropy, dispersio, threshold, ecc, lattice

function dispersio(message, n, k) {
  // Information Dispersal Algorithm
  // Split message into n fragments
  // Any k fragments reconstruct the original
  const fragments = [];
  for (let i = 0; i < n; i++) {
    fragments.push(encode(message, i, k));
  }
  return fragments;
}
</textarea>
    </div>

    <!-- match strip -->
    <div class="match-strip" id="matchStrip">
      <span class="match-label">matched →</span>
      <span id="matchNodes" style="display:flex;gap:6px;flex-wrap:wrap"></span>
    </div>

    <!-- output -->
    <div class="editor-output">
      <div class="output-header">
        <span class="output-label">output</span>
        <button class="run-btn" id="btnRun">▶ run</button>
      </div>
      <div class="output-body" id="outputBody">
        <span class="out-info">// ready</span>
      </div>
    </div>
  </div>

</div>

// ═══════════════════════════════════════════════════════════
// STATIC DISPERSAL GRAPH (free tier)
// ═══════════════════════════════════════════════════════════
(function(){
  const canvas = document.getElementById('bhCanvas');
  const ctx = canvas.getContext('2d');
  const PINK = '#e14169', BLUE = '#6190ff';
  const DIM_B = 'rgba(97,144,255,0.22)', DIM_P = 'rgba(225,65,105,0.16)';
  let W, H, cx, cy, nodeData = [];

  function build() {
    nodeData = [];
    cx = W / 2; cy = H / 2;
    const clusters = [
      { angle: -0.5,  dist: W*0.20, hubR: 6,  leafN: 24, leafR: W*0.09, color: PINK, lc: BLUE,  dc: DIM_B },
      { angle:  0.65, dist: W*0.20, hubR: 8,  leafN: 28, leafR: W*0.10, color: PINK, lc: BLUE,  dc: DIM_B },
      { angle:  1.75, dist: W*0.19, hubR: 5,  leafN: 20, leafR: W*0.08, color: BLUE, lc: PINK,  dc: DIM_P },
      { angle:  2.75, dist: W*0.20, hubR: 7,  leafN: 26, leafR: W*0.09, color: PINK, lc: BLUE,  dc: DIM_B },
      { angle: -2.1,  dist: W*0.18, hubR: 5,  leafN: 22, leafR: W*0.08, color: BLUE, lc: PINK,  dc: DIM_P },
      { angle:  3.85, dist: W*0.13, hubR: 4,  leafN: 16, leafR: W*0.07, color: BLUE, lc: PINK,  dc: DIM_P },
    ];
    clusters.forEach((def, ci) => {
      const hx = cx + Math.cos(def.angle) * def.dist;
      const hy = cy + Math.sin(def.angle) * def.dist;
      const hub = { x: hx, y: hy, r: def.hubR, color: def.color, isHub: true, leaves: [], def };
      nodeData.push(hub);
      for (let i = 0; i < def.leafN; i++) {
        const a = (i / def.leafN) * Math.PI * 2 + ci * 0.37;
        const d = def.leafR * (0.5 + Math.random() * 0.5);
        hub.leaves.push({ x: hx + Math.cos(a)*d, y: hy + Math.sin(a)*d,
          r: 1.5 + Math.random()*2, color: def.lc, dim: def.dc, isHub: false });
      }
    });
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    // core glow
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, W*0.16);
    g.addColorStop(0, 'rgba(65,105,225,0.14)'); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, W*0.16, 0, Math.PI*2); ctx.fill();
    // black hole
    ctx.beginPath(); ctx.arc(cx, cy, W*0.042, 0, Math.PI*2);
    ctx.fillStyle = '#060810'; ctx.fill();
    ctx.strokeStyle = 'rgba(65,105,225,0.45)'; ctx.lineWidth = 0.8; ctx.stroke();
    // event horizon dashed
    ctx.beginPath(); ctx.arc(cx, cy, W*0.054, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(65,105,225,0.18)'; ctx.lineWidth = 0.5;
    ctx.setLineDash([2, 5]); ctx.stroke(); ctx.setLineDash([]);
    // hubs
    const hubs = nodeData.filter(n => n.isHub);
    // center→hub edges
    hubs.forEach(hub => {
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(hub.x, hub.y);
      ctx.strokeStyle = hub.color === PINK ? 'rgba(225,65,105,0.5)' : 'rgba(97,144,255,0.4)';
      ctx.lineWidth = 0.9; ctx.stroke();
    });
    // hub→leaf edges + leaves
    hubs.forEach(hub => {
      hub.leaves.forEach(leaf => {
        ctx.beginPath(); ctx.moveTo(hub.x, hub.y); ctx.lineTo(leaf.x, leaf.y);
        ctx.strokeStyle = leaf.dim; ctx.lineWidth = 0.4; ctx.stroke();
        ctx.beginPath(); ctx.arc(leaf.x, leaf.y, leaf.r, 0, Math.PI*2);
        ctx.fillStyle = leaf.color === PINK ? 'rgba(225,65,105,0.55)' : 'rgba(97,144,255,0.5)';
        ctx.fill();
      });
    });
    // hub nodes
    hubs.forEach(hub => {
      const hg = ctx.createRadialGradient(hub.x, hub.y, 0, hub.x, hub.y, hub.r*3.5);
      hg.addColorStop(0, hub.color === PINK ? 'rgba(225,65,105,0.28)' : 'rgba(97,144,255,0.22)');
      hg.addColorStop(1, 'transparent');
      ctx.beginPath(); ctx.arc(hub.x, hub.y, hub.r*3.5, 0, Math.PI*2);
      ctx.fillStyle = hg; ctx.fill();
      ctx.beginPath(); ctx.arc(hub.x, hub.y, hub.r, 0, Math.PI*2);
      ctx.fillStyle = hub.color; ctx.fill();
    });
    // label
    ctx.fillStyle = 'rgba(65,105,225,0.6)';
    ctx.font = `${Math.max(8, W*0.018)}px JetBrains Mono, monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('dispersio', cx, cy + W*0.042 + 13);
  }

  function resize() {
    const parent = canvas.parentElement;
    W = parent.clientWidth; H = parent.clientHeight;
    canvas.width  = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
    build(); render();
  }
  window.addEventListener('resize', resize);
  setTimeout(resize, 100);
  setTimeout(resize, 400); // mobile fallback
})();
